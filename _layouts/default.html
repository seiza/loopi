<!DOCTYPE html>
<html lang="{{ page.lang | default: site.default_lang }}">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/loop-o.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    {% feed_meta %}
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
                <img src="{{ '/assets/images/loopy-bot-waving.svg' | relative_url }}" alt="Loopy Bot" class="loopy-logo">
                Loopi
            </a>
            <nav class="site-nav">
                <div class="trigger">
                    {% if page.lang == "fr" %}
                    <a class="page-link" href="{{ '/fr/about.html' | relative_url }}">À propos</a>
                    {% else %}
                    <a class="page-link" href="{{ '/en/about.html' | relative_url }}">About</a>
                    {% endif %}
                    <a class="page-link" href="{{ '/en/' | relative_url }}">EN</a>
                    <a class="page-link" href="{{ '/fr/' | relative_url }}">FR</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="page-content" aria-label="Content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="wrapper">
            <div class="footer-col-wrapper">
                <div class="footer-col">
                    <p>{{ site.description }}</p>
                    <p>&copy; 2026 <a href="https://github.com/seiza">seiza</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
        function handleImageError(img) {
            img.onerror = null; // Prevent infinite loop if placeholder also fails
            img.src = "{{ '/assets/images/loopy-bot.svg' | relative_url }}";
            img.style.opacity = "0.5";
        }

        function setView(view) {
            const grids = document.querySelectorAll('.resources-grid');
            const tileBtn = document.querySelectorAll('.btn-tile');
            const tableBtn = document.querySelectorAll('.btn-table');
            
            if (view === 'table') {
                grids.forEach(g => g.classList.add('view-table'));
                tableBtn.forEach(b => b.classList.add('active'));
                tileBtn.forEach(b => b.classList.remove('active'));
            } else {
                grids.forEach(g => g.classList.remove('view-table'));
                tileBtn.forEach(b => b.classList.add('active'));
                tableBtn.forEach(b => b.classList.remove('active'));
            }
            localStorage.setItem('preferredView', view);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedView = localStorage.getItem('preferredView');
            if (savedView) {
                setView(savedView);
            }
        });
    </script>
</body>
</html>
