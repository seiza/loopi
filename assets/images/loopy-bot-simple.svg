<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Antennas -->
  <line x1="80" y1="20" x2="90" y2="40" stroke="#4a90e2" stroke-width="4" />
  <line x1="120" y1="20" x2="110" y2="40" stroke="#4a90e2" stroke-width="4" />
  <circle cx="80" cy="20" r="5" fill="#f5a623" />
  <circle cx="120" cy="20" r="5" fill="#f5a623" />

  <!-- Head -->
  <rect x="60" y="30" width="80" height="60" rx="15" fill="#4a90e2" />

  <!-- Eyes -->
  <circle cx="85" cy="55" r="8" fill="white" />
  <circle cx="85" cy="55" r="4" fill="#333" />
  <circle cx="115" cy="55" r="8" fill="white" />
  <circle cx="115" cy="55" r="4" fill="#333" />

  <!-- Mouth (Happy) -->
  <path d="M 85 75 Q 100 85 115 75" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Body -->
  <rect x="50" y="90" width="100" height="80" rx="20" fill="#4a90e2" />

  <!-- Circular Arrow Loop on the body -->
  <path d="M 100 115 A 15 15 0 1 1 85 130" stroke="#f5a623" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M 77 137 L 85 130 L 93 137" stroke="#f5a623" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Arms -->
  <rect x="30" y="100" width="20" height="40" rx="10" fill="#4a90e2" />
  <rect x="150" y="100" width="20" height="40" rx="10" fill="#4a90e2" />

  <!-- Feet -->
  <rect x="70" y="170" width="20" height="15" rx="5" fill="#333" />
  <rect x="110" y="170" width="20" height="15" rx="5" fill="#333" />
</svg>
